# Lint/build/test only. Publishing is handled by publish.yml (npm token required).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify publish build (prepublishOnly)
        run: npm run prepublishOnly

      - name: Pack dry-run
        run: npm pack --dry-run
